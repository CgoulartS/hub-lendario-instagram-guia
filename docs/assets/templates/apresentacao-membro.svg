<svg width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="1080" height="6" fill="#c9a84c"/>
  <!-- Logo -->
  <text x="80" y="100" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">♾️ HUB LENDÁRIO {CIDADE}</text>
  <!-- Photo placeholder -->
  <circle cx="540" cy="380" r="140" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="2"/>
  <text x="540" y="390" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="18">Foto do</text>
  <text x="540" y="415" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="18">Membro</text>
  <!-- Name - EDITABLE -->
  <text x="540" y="600" text-anchor="middle" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="44">Nome do Membro</text>
  <!-- Role - EDITABLE -->
  <text x="540" y="650" text-anchor="middle" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24">Profissão / Área de atuação</text>
  <!-- Divider -->
  <rect x="490" y="690" width="100" height="3" rx="2" fill="#c9a84c"/>
  <!-- Quote - EDITABLE -->
  <text x="540" y="770" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="22" font-style="italic">"Como eu uso IA no meu dia a dia"</text>
  <!-- Badge -->
  <rect x="410" y="860" width="260" height="44" rx="22" fill="rgba(201,168,76,0.15)"/>
  <text x="540" y="888" text-anchor="middle" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="2">MEMBRO LENDÁRIO</text>
  <!-- Footer -->
  <text x="540" y="1000" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="16">Comunidade de IA · Conectando o artificial ao natural</text>
  <!-- Bottom accent -->
  <rect x="0" y="1074" width="1080" height="6" fill="#c9a84c"/>
</svg>
