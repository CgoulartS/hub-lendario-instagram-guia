<svg width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <!-- Top accent -->
  <rect x="0" y="0" width="1080" height="6" fill="#c9a84c"/>
  <!-- Logo -->
  <text x="80" y="100" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600">♾️ HUB LENDÁRIO {CIDADE}</text>
  <!-- Badge -->
  <rect x="80" y="160" width="260" height="40" rx="20" fill="rgba(201,168,76,0.15)"/>
  <text x="210" y="186" text-anchor="middle" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="2">🤖 IA NA PRÁTICA</text>
  <!-- Tool name - EDITABLE -->
  <text x="80" y="310" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="52">Nome da</text>
  <text x="80" y="380" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="52">Ferramenta</text>
  <!-- Divider -->
  <rect x="80" y="420" width="60" height="3" rx="2" fill="#c9a84c"/>
  <!-- Description - EDITABLE -->
  <text x="80" y="490" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="24">O que faz:</text>
  <text x="80" y="530" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-size="22">Breve descrição da ferramenta e como</text>
  <text x="80" y="560" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-size="22">ela pode ser usada no dia a dia.</text>
  <!-- Screenshot area -->
  <rect x="80" y="610" width="920" height="300" rx="12" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="540" y="770" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="20">📱 Print / Screenshot da ferramenta</text>
  <!-- Footer -->
  <text x="80" y="980" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="18">Testado por membros do Hub · Resultado real</text>
  <text x="80" y="1020" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="16">Comunidade de IA · Conectando o artificial ao natural</text>
  <!-- Bottom accent -->
  <rect x="0" y="1074" width="1080" height="6" fill="#c9a84c"/>
</svg>
