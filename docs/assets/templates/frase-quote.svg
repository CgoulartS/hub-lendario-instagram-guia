<svg width="1080" height="1080" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#0a0a0a"/>
  <!-- Subtle background circles -->
  <circle cx="540" cy="540" r="350" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="540" cy="540" r="250" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Quote marks -->
  <text x="100" y="320" fill="#c9a84c" font-family="Georgia, serif" font-size="180" opacity="0.2">"</text>
  <!-- Main quote - EDITABLE -->
  <text x="540" y="480" text-anchor="middle" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="48">IA é ferramenta,</text>
  <text x="540" y="550" text-anchor="middle" fill="#f5f5f5" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="48">não destino.</text>
  <!-- Accent line -->
  <rect x="490" y="600" width="100" height="3" rx="2" fill="#c9a84c"/>
  <!-- Brand -->
  <text x="540" y="700" text-anchor="middle" fill="#c9a84c" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="3">♾️ HUB LENDÁRIO</text>
  <!-- Subtitle -->
  <text x="540" y="740" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="18">Conectando o artificial ao natural</text>
  <!-- Footer -->
  <text x="540" y="980" text-anchor="middle" fill="#888888" font-family="Inter, system-ui, sans-serif" font-size="16" opacity="0.5">@hublendario{cidade}</text>
</svg>
